name: stabil

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stabil}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stabil}
      POSTGRES_DB: ${POSTGRES_DB:-stabil}
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stabil} -d ${POSTGRES_DB:-stabil}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-stabil}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-stabilsecret}
    ports:
      - "59000:9000"
      - "59001:9001"
    volumes:
      - miniodata:/data

  # One-shot: create the buckets, then exit. Retries until MinIO is reachable.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-stabil} ${MINIO_ROOT_PASSWORD:-stabilsecret}; do
        echo 'waiting for minio...'; sleep 2;
      done;
      mc mb -p local/${MINIO_BUCKET_DOCUMENTS:-stabil-documents};
      mc mb -p local/${MINIO_BUCKET_REPORTS:-stabil-reports};
      mc anonymous set none local/${MINIO_BUCKET_DOCUMENTS:-stabil-documents};
      mc anonymous set none local/${MINIO_BUCKET_REPORTS:-stabil-reports};
      echo 'buckets ready'; exit 0;
      "

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-stabil}:${POSTGRES_PASSWORD:-stabil}@postgres:5432/${POSTGRES_DB:-stabil}?schema=public
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: http://localhost:59000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-stabil}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-stabilsecret}
      MINIO_BUCKET_DOCUMENTS: ${MINIO_BUCKET_DOCUMENTS:-stabil-documents}
      MINIO_BUCKET_REPORTS: ${MINIO_BUCKET_REPORTS:-stabil-reports}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SMTP_URL: ${SMTP_URL:-}
      EMAIL_FROM: ${EMAIL_FROM:-Stabil <no-reply@stabil.dev>}
    ports:
      - "3301:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      # Server-side fetches use the in-network service name; the browser uses the mapped host port.
      API_URL: http://api:3001
      NEXT_PUBLIC_API_URL: http://localhost:3301
    ports:
      - "3300:3000"
    depends_on:
      - api

volumes:
  pgdata:
  miniodata:
